name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (test + OpenAPI drift gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('api/**/*.gradle.kts', 'api/gradle/wrapper/gradle-wrapper.properties') }}

      # Runs the full Testcontainers suite (Docker is available on ubuntu runners).
      # The OpenApiSpecDriftTest re-dumps the spec and fails if it differs from the
      # committed ../api-docs.json — this is the drift gate.
      - name: ./gradlew test
        run: ./gradlew --no-daemon test

  web:
    name: Web (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      # postinstall regenerates app/api/* from the committed ../api-docs.json
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
