name: Deploy API (Fly.io)

# Deploys the Spring Boot API to Fly.io on push to main, after CI passes.
# Requires repo secret FLY_API_TOKEN  (create with: fly tokens create deploy)
# The Nuxt frontend deploys via Vercel's native Git integration — no workflow needed.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    name: fly deploy
    runs-on: ubuntu-latest
    # Only deploy if CI succeeded (or when triggered manually)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config api/fly.toml --dockerfile api/Dockerfile
        working-directory: .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
