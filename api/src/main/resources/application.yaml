spring:
    # bootRun (no explicit profile) picks up dev conveniences from application-local.yaml.
    # Production sets SPRING_PROFILES_ACTIVE=prod; the test suite sets @ActiveProfiles("test").
    profiles:
        default: local
    config:
        import: "optional:file:.env[.properties]"
    application:
        name: synoptic-engine-api
    servlet:
        multipart:
            # T4.3 — impose a hard ceiling at the servlet layer before any controller
            # handler sees the bytes. Per-endpoint limits are enforced additionally
            # by FileUploadGuard (activity files: 10 MB, email attachments: 25 MB,
            # CSV imports: 10 MB). The max-request-size is set to 200 MB to permit
            # one compose request with several large attachments; per-file cap is
            # enforced in FileUploadGuard.validateEmailAttachment.
            max-file-size: 25MB
            max-request-size: 200MB
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.PostgreSQLDialect
                # T5.1 — batch-fetch lazy collections in a single IN-clause query per
                # page rather than N individual selects.  Paginated list/filter/search
                # paths (Lead, Quote, Person) all touch LAZY collections in toResponse();
                # this eliminates the per-entity secondary select without the in-memory
                # pagination risk that LEFT JOIN FETCH + pageable triggers.
                default_batch_fetch_size: 30
    flyway:
        enabled: true
    mail:
        # No fallbacks for prod-critical config: a missing MAIL_HOST/MAIL_PORT must fail fast,
        # not silently default to a local mailbox. Dev/test values live in the local/test profiles.
        host: ${MAIL_HOST}
        port: ${MAIL_PORT}
        username: ${MAIL_USERNAME:}
        password: ${MAIL_PASSWORD:}
        properties:
            mail:
                smtp:
                    auth: ${MAIL_SMTP_AUTH:false}
                    starttls:
                        enable: ${MAIL_SMTP_STARTTLS:false}
server:
    servlet:
        context-path: /api
    port: ${PORT:8090}
    forward-headers-strategy: framework
management:
    health:
        mail:
            enabled: false
mail:
    from: ${MAIL_FROM}
jwt:
    # No fallback secret in the base config — a missing JWT_SECRET must fail the boot rather
    # than ship a publicly-known signing key. Dev/test secrets live in the local/test profiles.
    secret: ${JWT_SECRET}
    access-token-expiry: 900000      # 15 minutes
    refresh-token-expiry: 604800000  # 7 days
cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
synoptic:
    admin:
        email: ${SYNOPTIC_ADMIN_EMAIL}
        password: ${SYNOPTIC_ADMIN_PASSWORD}
    storage:
        root: ${SYNOPTIC_STORAGE_ROOT:./storage}
    inbound-mail:
        # HMAC secret shared with the upstream inbound-mail webhook provider
        # (Postmark / SendGrid / etc.). Leave blank to refuse all inbound deliveries.
        webhook-secret: ${SYNOPTIC_INBOUND_MAIL_SECRET:}
    encryption:
        # AES-256-GCM key for at-rest secret columns (webhooks.secret, system_configs.value).
        # Must be a base64-encoded 32-byte (256-bit) random key.
        # Generate: openssl rand -base64 32
        # REQUIRED in non-dev profiles; SecretsGuard refuses to start if absent.
        key: ${SYNOPTIC_ENCRYPTION_KEY:}
    inventory:
        reorder:
            cron: "0 0 6 * * *"
    marketing:
        send-batch-size: 100
        send-fixed-delay-ms: 30000
        send-initial-delay-ms: 60000
