spring:
    application:
        name: synoptic-engine-api
    servlet:
        multipart:
            # T4.3 — impose a hard ceiling at the servlet layer before any controller
            # handler sees the bytes. Per-endpoint limits are enforced additionally
            # by FileUploadGuard (activity files: 10 MB, email attachments: 25 MB,
            # CSV imports: 10 MB). The max-request-size is set to 200 MB to permit
            # one compose request with several large attachments; per-file cap is
            # enforced in FileUploadGuard.validateEmailAttachment.
            max-file-size: 25MB
            max-request-size: 200MB
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.PostgreSQLDialect
                # T5.1 — batch-fetch lazy collections in a single IN-clause query per
                # page rather than N individual selects.  Paginated list/filter/search
                # paths (Lead, Quote, Person) all touch LAZY collections in toResponse();
                # this eliminates the per-entity secondary select without the in-memory
                # pagination risk that LEFT JOIN FETCH + pageable triggers.
                default_batch_fetch_size: 30
    flyway:
        enabled: true
    mail:
        host: ${MAIL_HOST:localhost}
        port: ${MAIL_PORT:1025}
        username: ${MAIL_USERNAME:}
        password: ${MAIL_PASSWORD:}
        properties:
            mail:
                smtp:
                    auth: ${MAIL_SMTP_AUTH:false}
                    starttls:
                        enable: ${MAIL_SMTP_STARTTLS:false}
server:
    port: 8090
    forward-headers-strategy: framework
api:
    base-path: /api
mail:
    from: ${MAIL_FROM:noreply@synopticengine.com}
jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-change-in-production-never-hardcode-this}
    access-token-expiry: 900000      # 15 minutes
    refresh-token-expiry: 604800000  # 7 days
cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
synoptic:
    admin:
        email: ${SYNOPTIC_ADMIN_EMAIL:admin@synoptic.dev}
        password: ${SYNOPTIC_ADMIN_PASSWORD:Admin@123}
    storage:
        root: ${SYNOPTIC_STORAGE_ROOT:./storage}
    inbound-mail:
        # HMAC secret shared with the upstream inbound-mail webhook provider
        # (Postmark / SendGrid / etc.). Leave blank to refuse all inbound deliveries.
        webhook-secret: ${SYNOPTIC_INBOUND_MAIL_SECRET:}
    encryption:
        # AES-256-GCM key for at-rest secret columns (webhooks.secret, system_configs.value).
        # Must be a base64-encoded 32-byte (256-bit) random key.
        # Generate: openssl rand -base64 32
        # REQUIRED in non-dev profiles; SecretsGuard refuses to start if absent.
        key: ${SYNOPTIC_ENCRYPTION_KEY:}
