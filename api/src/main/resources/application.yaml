spring:
    application:
        name: synoptic-engine-api
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.PostgreSQLDialect
    flyway:
        enabled: true
    mail:
        host: ${MAIL_HOST:localhost}
        port: ${MAIL_PORT:1025}
        username: ${MAIL_USERNAME:}
        password: ${MAIL_PASSWORD:}
        properties:
            mail:
                smtp:
                    auth: ${MAIL_SMTP_AUTH:false}
                    starttls:
                        enable: ${MAIL_SMTP_STARTTLS:false}
server:
    port: 8090
api:
    base-path: /api
mail:
    from: ${MAIL_FROM:noreply@synopticengine.com}
jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-change-in-production-never-hardcode-this}
    access-token-expiry: 900000      # 15 minutes
    refresh-token-expiry: 604800000  # 7 days
cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000,http://192.168.*:3000,http://192.168.*.*:3000}
synoptic:
    admin:
        email: ${SYNOPTIC_ADMIN_EMAIL:admin@synoptic.dev}
        password: ${SYNOPTIC_ADMIN_PASSWORD:Admin@123}
    storage:
        root: ${SYNOPTIC_STORAGE_ROOT:./storage}
    inbound-mail:
        # HMAC secret shared with the upstream inbound-mail webhook provider
        # (Postmark / SendGrid / etc.). Leave blank to refuse all inbound deliveries.
        webhook-secret: ${SYNOPTIC_INBOUND_MAIL_SECRET:}
