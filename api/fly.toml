# Fly.io config for the Synoptic Engine API (Spring Boot).
# Create the app once with:  fly launch --no-deploy --copy-config
# then set secrets (see DEPLOYMENT.md) and:  fly deploy
app = "synoptic-engine-api"
primary_region = "iad"   # pick the region nearest your Neon DB

[build]
  dockerfile = "Dockerfile"

[env]
  # Non-secret config. Secrets (JWT_SECRET, DB creds, encryption key, mail) via `fly secrets set`.
  SERVER_PORT = "8090"
  SPRING_PROFILES_ACTIVE = "prod"
  SYNOPTIC_STORAGE_ROOT = "/data/storage"

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # set to 1 to avoid cold-start during the demo

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/api/actuator/health"   # actuator sits under server.servlet.context-path (/api)

# Persistent disk so uploaded files survive restarts (filesystem is otherwise ephemeral).
[[mounts]]
  source = "synoptic_storage"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"   # Spring Boot 4 + Hibernate needs headroom; 512mb risks OOM on boot
